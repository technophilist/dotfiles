# custom keybindings
unbind r 
bind r source-file ~/.tmux.conf

unbind A
bind A attach-session -c "#{pane_current_path}"

# enable mouse support
set -g mouse on

# vim motions setup 
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
# resizing pane with vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

set-option -g status-position top

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'

#!/usr/bin/env bash

# (Github Dark Default) Colors for Tmux
# --- GITHUB DARK DEFAULT (DARK BAR VERSION) ---
set -g status-style "fg=#007acc,bg=#1e1e1e"
set -g message-style "fg=#cccccc,bg=#1e1e1e"

# Status Left (Session Name)
set -g status-left-length 50
set -g status-left "#[fg=#1e1e1e,bg=#007acc,bold] #S #[fg=#007acc,bg=#1e1e1e,nobold]"

# Windows (Tabs)
setw -g window-status-style "fg=#858585,bg=#1e1e1e"
setw -g window-status-current-format "#[fg=#1e1e1e,bg=#4ec9b0,bold] #I  #W #[fg=#4ec9b0,bg=#1e1e1e,nobold]"
setw -g window-status-format "#[fg=#1e1e1e,bg=#2d2d2d]#[fg=#858585] #I  #W #[fg=#2d2d2d,bg=#1e1e1e]"

# Status Right (Date/Time)
set -g status-right "#[fg=#2d2d2d,bg=#1e1e1e]#[fg=#cccccc,bg=#2d2d2d] %Y-%m-%d  %I:%M %p #[fg=#007acc,bg=#2d2d2d]#[fg=#1e1e1e,bg=#007acc,bold] #h "

# Fix for kiro-cli breaking vim-tmux-navigator.
# kiro-cli wraps the terminal in a pseudo-terminal (PTY), so the default check (ps -t <tty>)
# only sees the pseudo-terminal wrapper process "zsh (kiro-cli-term)" as foreground —
# even when nvim is running inside it. This makes every pane look like vim.
#
# Fix: walk the process tree from #{pane_pid} instead of checking the pseudo-terminal (PTY).
#   pane_pid → child pids (pgrep -P) → grandchild pids → check if any is nvim
# A pane running nvim will have it as a grandchild; a plain zsh pane won't.
set -g @vim_navigator_check "pgrep -P '#{pane_pid}' | xargs -I{} pgrep -P {} | xargs ps -o comm= -p 2>/dev/null | grep -iqE '^(\\S+/)?g?\\.?(view|l?n?vim?x?)(diff)?(-wrapped)?$'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
